name: controle_de_armada
description: Aplicativo profissional para registrar resultados de armadas em competições.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.4.0

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI/Design
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0

  # Export
  pdf: ^3.10.7
  excel: ^2.1.0
  path_provider: ^2.1.1
  permission_handler: ^11.4.4

  # Firebase Preparation
  firebase_core: ^2.24.2
  firebase_database: ^10.3.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.17.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300